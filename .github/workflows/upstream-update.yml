name: Update stable upstream release

on:
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:
  push:
    paths:
      - manifest.toml
      - conf/image.env
      - tools/update_upstream.py
      - tools/validate_package.py
      - .github/workflows/upstream-update.yml

permissions:
  contents: write

concurrency:
  group: upstream-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve newest stable official image
        run: python3 tools/update_upstream.py
      - name: Validate generated package state
        run: |
          python3 tools/validate_package.py
          python3 -m py_compile tools/*.py
          for script in scripts/*; do bash -n "$script"; done
          image=$(sed -n 's/^GITEA_MCP_IMAGE=//p' conf/image.env)
          docker manifest inspect "$image" >/dev/null
      - name: Commit immutable image pin
        run: |
          if git diff --quiet; then
            echo "No stable update available"
            exit 0
          fi
          git config user.name "gitea-mcp-ynh-updater"
          git config user.email "gitea-mcp-ynh-updater@users.noreply.github.com"
          git add manifest.toml conf/image.env
          version=$(sed -n 's/^GITEA_MCP_VERSION=//p' conf/image.env)
          git commit -m "Update Gitea MCP to ${version}"
          git push origin HEAD:main
